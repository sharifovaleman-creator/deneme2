<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smile to Open Card</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    background: #222;
    color: white;
    font-family: sans-serif;
  }
  video {
    display: none; /* Kamera görünməsin, amma işləyəcək */
  }
  .card {
    width: 300px;
    height: 200px;
    background: #ff5722;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 12px;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.5s ease;
    text-align: center;
    font-size: 20px;
  }
  .card.active {
    opacity: 1;
    transform: scale(1);
  }
  .hint {
    margin-top: 20px;
    font-size: 16px;
    color: #ccc;
  }
</style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>
<div class="card" id="card">🎉 Card Açıldı! 🎉</div>
<div class="hint">Gül və card aç!</div>

<!-- ml5.js library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/ml5/0.12.2/ml5.min.js"></script>
<script>
  const card = document.getElementById('card');
  const video = document.getElementById('webcam');

  // Kamera icazəsi
  navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => {
      video.srcObject = stream;
    })
    .catch(err => {
      alert("Kamera icazəsi alınmadı: " + err);
    });

  // Face expression model yüklə
  let classifier;
  ml5.faceApi(video, { withLandmarks: true, withExpressions: true, withDescriptors: false }, modelReady);

  function modelReady() {
    console.log("Model yükləndi!");
    detect();
  }

  function detect() {
    ml5.faceApi(video, { withExpressions: true }, model => {
      model.detect(gotResults);
    });
    requestAnimationFrame(detect);
  }

  function gotResults(err, result) {
    if (err) { console.error(err); return; }
    if (result && result.length > 0) {
      const expressions = result[0].expressions;
      // Smile threshold 0.7-dən böyük olarsa card aç
      if (expressions.happy > 0.7) {
        card.classList.add('active');
      }
    }
  }
</script>

</body>
</html>
