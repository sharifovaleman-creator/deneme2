<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smile to Open Card</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    background: #222;
    color: white;
    font-family: sans-serif;
  }
  video {
    border: 3px solid #fff;
    border-radius: 12px;
    margin-bottom: 20px;
    width: 320px;
    height: 240px;
  }
  .card {
    width: 300px;
    height: 200px;
    background: #ff5722;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 12px;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.5s ease;
    text-align: center;
    font-size: 20px;
  }
  .card.active {
    opacity: 1;
    transform: scale(1);
  }
  .hint {
    margin-top: 10px;
    font-size: 16px;
    color: #ccc;
  }
</style>
</head>
<body>

<video id="webcam" autoplay muted playsinline></video>
<div class="card" id="card">🎉 Card Açıldı! 🎉</div>
<div class="hint">Gül və card açılacaq!</div>

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
  const video = document.getElementById('webcam');
  const card = document.getElementById('card');

  async function setupCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    return new Promise(resolve => {
      video.onloadedmetadata = () => resolve(video);
    });
  }

  async function loadModels() {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/weights';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
  }

  async function detectSmile() {
    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                                     .withFaceExpressions();
    if (detections.length > 0) {
      const expressions = detections[0].expressions;
      if (expressions.happy > 0.6) { // Smile threshold
        card.classList.add('active');
      } else {
        card.classList.remove('active'); // Gülüş yoxdursa card gizlənsin
      }
    }
    requestAnimationFrame(detectSmile);
  }

  async function init() {
    await setupCamera();
    await loadModels();
    detectSmile();
  }

  init();
</script>

</body>
</html>
